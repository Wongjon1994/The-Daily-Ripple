# Render Blueprint — deploys The Daily Ripple as a single Node web service.
# It builds the Vite SPA + bundles the Express server, then runs `pnpm start`
# (NODE_ENV=production node dist/index.js), which serves the SPA and the API.
# Spec: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: the-daily-ripple
    runtime: node
    plan: free
    autoDeploy: true
    # Run pnpm THROUGH corepack — `corepack enable` fails on Render's read-only
    # /usr/bin (EROFS). `corepack pnpm` needs no symlinks. Start runs node
    # directly so no package manager is needed at runtime.
    buildCommand: corepack pnpm install --frozen-lockfile && corepack pnpm run build
    startCommand: node dist/index.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: COREPACK_ENABLE_DOWNLOAD_PROMPT
        value: "0"
      # Postgres connection string from Neon or Supabase. Set the value in the
      # Render dashboard (sync:false keeps the secret out of the repo).
      - key: DATABASE_URL
        sync: false
      # Guards /api/publish, /api/realise and /api/synthesize. Set in the
      # dashboard; n8n sends it as the X-Api-Key header.
      - key: PUBLISH_API_KEY
        sync: false
      # Alpha Vantage key for the market-data refresh job. Set the value in the
      # Render dashboard (sync:false keeps the secret out of the repo).
      - key: ALPHAVANTAGE_API_KEY
        sync: false
      # Twelve Data key for the equity-index refresh. Set in the dashboard.
      - key: TWELVEDATA_API_KEY
        sync: false
      # FRED (St. Louis Fed) key — fresh daily US 10Y yield (DGS10). Free key from
      # fredaccount.stlouisfed.org. Without it, US 10Y falls back to laggy Alpha
      # Vantage. Set in the dashboard.
      - key: FRED_API_KEY
        sync: false
      # Anthropic key — Sonnet synthesis (Addendum B) + Haiku realisation verdicts
      # (Addendum A). Without it those jobs no-op gracefully. Set in the dashboard.
      - key: ANTHROPIC_API_KEY
        sync: false
      # Tavily key — web search for the weekly realisation sweep (Addendum A).
      # Without it the sweep runs the expiry pass only. Set in the dashboard.
      - key: TAVILY_API_KEY
        sync: false
      # OpenAI key — text-embedding-3-small for RAG (Agentic Ripple, Phase A):
      # embeds signals + brief chunks into pgvector for semantic search. Without
      # it, embedding backfill and /search no-op. Set in the dashboard.
      - key: OPENAI_API_KEY
        sync: false
