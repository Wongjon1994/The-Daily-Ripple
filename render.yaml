# Render Blueprint — deploys The Daily Ripple as a single Node web service.
# It builds the Vite SPA + bundles the Express server, then runs `pnpm start`
# (NODE_ENV=production node dist/index.js), which serves the SPA and the API.
# Spec: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: the-daily-ripple
    runtime: node
    plan: free
    autoDeploy: true
    # Run pnpm THROUGH corepack — `corepack enable` fails on Render's read-only
    # /usr/bin (EROFS). `corepack pnpm` needs no symlinks. Start runs node
    # directly so no package manager is needed at runtime.
    buildCommand: corepack pnpm install --frozen-lockfile && corepack pnpm run build
    startCommand: node dist/index.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: COREPACK_ENABLE_DOWNLOAD_PROMPT
        value: "0"
      # Postgres connection string from Neon or Supabase. Set the value in the
      # Render dashboard (sync:false keeps the secret out of the repo).
      - key: DATABASE_URL
        sync: false
      # Set only if n8n will publish briefs to /api/publish:
      # - key: PUBLISH_API_KEY
      #   generateValue: true
      # Alpha Vantage key for the market-data refresh job. Set the value in the
      # Render dashboard (sync:false keeps the secret out of the repo).
      - key: ALPHAVANTAGE_API_KEY
        sync: false
      # Twelve Data key for the equity-index refresh. Set in the dashboard.
      - key: TWELVEDATA_API_KEY
        sync: false
